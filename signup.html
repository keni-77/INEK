<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>INEK - 新規登録</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding-top: 60px;
      background: #fff5fb;
      color: #444;
    }

    h2 {
      color: #ff7ab8;
      margin-bottom: 20px;
    }

    input {
      width: 80%;
      max-width: 300px;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: 2px solid #ff9ecb;
      font-size: 1rem;
    }

    button {
      width: 80%;
      max-width: 300px;
      padding: 12px;
      margin-top: 20px;
      border: none;
      border-radius: 10px;
      background: #ff9ecb;
      color: white;
      font-size: 1.1rem;
      cursor: pointer;
    }

    .link {
      margin-top: 20px;
      font-size: 0.9rem;
    }

    .link a {
      color: #ff7ab8;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <h2>新規登録</h2>

  <input id="username" type="text" placeholder="ユーザー名">
  <input id="email" type="email" placeholder="メールアドレス">
  <input id="password" type="password" placeholder="パスワード">

  <button onclick="signup()">登録する</button>

  <div class="link">
    <!-- login.html を別タブで開くように変更 -->
    <a href="login.html">ログインはこちら</a>
  </div>

  <script type="module" src="signup.js"></script>
</body>
</html>
