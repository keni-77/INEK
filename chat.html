<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>INEK - Chat</title>
  <link rel="icon" href="favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Firebase 初期化（Auth + RealtimeDB） -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
    import { getDatabase, ref, set, update, get, push, onChildAdded }
      from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";
    import { firebaseConfig } from "./firebaseConfig.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // メール → @ID
    function getUserIdFromEmail(email) {
      return "@" + email.split("@")[0];
    }

    // ログインチェック & ユーザー登録
    onAuthStateChanged(auth, user => {
      if (!user) {
        window.location.href = "index.html";
        return;
      }

      const uid = getUserIdFromEmail(user.email);

      // 右上に表示
      document.getElementById("userStatus").textContent =
        `${user.displayName} でログイン中`;

      // DB にユーザー情報を保存
      update(ref(db, "users/" + uid), {
        displayName: user.displayName,
        email: user.email
      });
    });

    // 他の script から使えるように export
    window.firebaseExports = {
      auth, db, getUserIdFromEmail, ref, update, get, push, onChildAdded
    };
  </script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #fff5fb;
      color: #444;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      background: #ff9ecb;
      color: #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    header .back {
      border: none;
      background: transparent;
      color: #fff;
      font-size: 1.4rem;
      margin-right: 8px;
      cursor: pointer;
    }

    /* 2カラムレイアウト */
    .layout {
      display: flex;
      height: calc(100vh - 56px);
    }

    /* 左：フレンド一覧 */
    .sidebar {
      width: 260px;
      background: #ffe3f1;
      border-right: 1px solid #f5c8dd;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .sidebar h2 {
      font-size: 1.1rem;
      color: #ff7ab8;
    }

    .search {
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #ffb6d9;
    }

    .friend-list {
      flex: 1;
      overflow-y: auto;
    }

    .friend {
      padding: 10px;
      background: #fff;
      border-radius: 8px;
      margin-bottom: 8px;
      cursor: pointer;
    }

    .friend:hover {
      background: #ffe6f3;
    }

    /* 右：チャット画面 */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 12px;
      gap: 8px;
    }

    .messages {
      flex: 1;
      background: #ffffff;
      border-radius: 16px;
      padding: 12px;
      overflow-y: auto;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    .message-row { display: flex; margin-bottom: 10px; }
    .message-row.me { justify-content: flex-end; }

    .bubble {
      max-width: 75%;
      padding: 8px 12px;
      border-radius: 14px;
      font-size: 0.9rem;
      line-height: 1.4;
      white-space: pre-wrap;
    }

    .bubble.me { background: #ff9ecb; color: #fff; }
    .bubble.other { background: #f3f3f3; color: #444; }

    .input-area {
      display: flex;
      gap: 8px;
      padding: 10px 12px 14px;
      background: #fff5fb;
      border-top: 1px solid rgba(0,0,0,0.05);
    }

    .input-area input {
      flex: 1;
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid #e3c7d7;
    }

    .input-area button {
      border: none;
      border-radius: 999px;
      padding: 0 18px;
      background: #ff7ab8;
      color: #fff;
      font-weight: 600;
    }
  </style>
</head>

<body>

  <header>
    <button class="back" onclick="goHome()">←</button>
    <div>
      <h1>INEK Chat</h1>
      <div class="sub">つながる、関わる、続ける。</div>
    </div>
    <div id="userStatus" style="margin-left:auto; font-size:0.8rem;"></div>
  </header>

  <main class="layout">

    <!-- 左：フレンド一覧 -->
    <aside class="sidebar">
      <h2>フレンド一覧</h2>

      <input id="friendSearch" class="search" placeholder="フレンド検索…">

      <div id="searchResults" class="friend-list"></div>

      <h2 style="margin-top:10px;">あなたのフレンド</h2>
      <div id="friendList" class="friend-list"></div>
    </aside>

    <!-- 右：チャット画面 -->
    <section class="chat-area">
      <div id="messages" class="messages"></div>

      <div class="input-area">
        <input id="messageInput" placeholder="メッセージを入力…">
        <button onclick="sendMessage()">送信</button>
      </div>
    </section>

  </main>

  <!-- フレンド検索・チャット処理 -->
  <script>
    const { auth, db, getUserIdFromEmail, ref, update, get, push, onChildAdded } =
      window.firebaseExports;

    let currentRoomId = null;

    function goHome() {
      window.location.href = "index.html";
    }

    // フレンド検索
    document.getElementById("friendSearch").addEventListener("input", async (e) => {
      const keyword = e.target.value.replace("@", "");
      if (!keyword) return;

      const snap = await get(ref(db, "users"));
      const results = [];

      snap.forEach(child => {
        const uid = child.key;
        if (uid.includes(keyword)) results.push(uid);
      });

      displaySearchResults(results);
    });

    function displaySearchResults(list) {
      const box = document.getElementById("searchResults");
      box.innerHTML = "";

      list.forEach(uid => {
        const div = document.createElement("div");
        div.className = "friend";
        div.textContent = uid;
        div.onclick = () => addFriend(uid);
        box.appendChild(div);
      });
    }

    // フレンド追加
    async function addFriend(friendId) {
      const me = getUserIdFromEmail(auth.currentUser.email);

      await update(ref(db, `users/${me}/friends`), {
        [friendId]: true
      });

      alert(`${friendId} をフレンドに追加しました！`);
      loadFriendList();
    }

    // フレンド一覧読み込み
    async function loadFriendList() {
      const me = getUserIdFromEmail(auth.currentUser.email);
      const snap = await get(ref(db, `users/${me}/friends`));

      const box = document.getElementById("friendList");
      box.innerHTML = "";

      if (!snap.exists()) return;

      const friends = snap.val();
      Object.keys(friends).forEach(uid => {
        const div = document.createElement("div");
        div.className = "friend";
        div.textContent = uid;
        div.onclick = () => openChatWith(uid);
        box.appendChild(div);
      });
    }

    // チャットルームを開く
    function openChatWith(friendId) {
      const me = getUserIdFromEmail(auth.currentUser.email);
      currentRoomId = [me, friendId].sort().join("_");

      document.getElementById("messages").innerHTML = "";
      loadMessages(currentRoomId);
    }

    // メッセージ受信
    function loadMessages(roomId) {
      const messagesRef = ref(db, `rooms/${roomId}/messages`);

      onChildAdded(messagesRef, (snap) => {
        const msg = snap.val();
        appendMessage(msg.text, msg.sender === getUserIdFromEmail(auth.currentUser.email) ? "me" : "other");
      });
    }

    // メッセージ表示
    function appendMessage(text, who) {
      const box = document.getElementById("messages");

      const row = document.createElement("div");
      row.className = `message-row ${who}`;

      const bubble = document.createElement("div");
      bubble.className = `bubble ${who}`;
      bubble.textContent = text;

      row.appendChild(bubble);
      box.appendChild(row);

      box.scrollTop = box.scrollHeight;
    }

    // メッセージ送信
    async function sendMessage() {
      const text = document.getElementById("messageInput").value.trim();
      if (!text || !currentRoomId) return;

      const me = getUserIdFromEmail(auth.currentUser.email);

      const msgRef = push(ref(db, `rooms/${currentRoomId}/messages`));
      await set(msgRef, {
        sender: me,
        text,
        timestamp: Date.now()
      });

      document.getElementById("messageInput").value = "";
    }

    // 初期化
    setTimeout(loadFriendList, 1000);
  </script>

</body>
</html>
