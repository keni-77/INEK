<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>INEK - Chat</title>
  <link rel="icon" href="favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Firebase 初期化（Auth + RealtimeDB） -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
  import { getDatabase, ref, set, update, get, push, onChildAdded }
    from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";
  import { firebaseConfig } from "./firebaseConfig.js";

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  // メール → @ID
  function getUserIdFromEmail(email) {
    return "@" + email.split("@")[0];
  }

  // ログインチェック & ユーザー登録
  onAuthStateChanged(auth, user => {
    if (!user) {
      window.location.href = "index.html";
      return;
    }

    const uid = getUserIdFromEmail(user.email);

    document.getElementById("userStatus").textContent =
      `${uid} でログイン中`;

    update(ref(db, "users/" + uid), {
      displayName: user.displayName || uid,
      email: user.email
    });

    // ログイン後にフレンド一覧を読み込む
    if (window.loadFriendList) window.loadFriendList();
  });

  // 他の script から使えるように export
  window.firebase = {
    auth, db, getUserIdFromEmail, ref, update, get, push, onChildAdded, set
  };
  </script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #fff5fb;
      color: #444;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      background: #ff9ecb;
      color: #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    header .back {
      border: none;
      background: transparent;
      color: #fff;
      font-size: 1.4rem;
      margin-right: 8px;
      cursor: pointer;
    }

    .layout {
      display: flex;
      height: calc(100vh - 56px);
    }

    /* 左：フレンド関連 */
    .sidebar {
      width: 280px;
      background: #ffe3f1;
      border-right: 1px solid #f5c8dd;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .sidebar h2 {
      font-size: 1.05rem;
      color: #ff7ab8;
      margin-bottom: 4px;
    }

    .label {
      font-size: 0.8rem;
      color: #aa6a8f;
      margin-bottom: 4px;
    }

    .search {
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #ffb6d9;
      font-size: 0.9rem;
      width: 100%;
    }

    .friend-list {
      flex: 1;
      overflow-y: auto;
    }

    .friend {
      padding: 10px;
      background: #fff;
      border-radius: 8px;
      margin-bottom: 8px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .friend:hover {
      background: #ffe6f3;
    }

    /* 右：チャット画面 */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 12px;
      gap: 8px;
    }

    .chat-header {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 4px;
    }

    .messages {
      flex: 1;
      background: #ffffff;
      border-radius: 16px;
      padding: 12px;
      overflow-y: auto;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    .message-row { display: flex; margin-bottom: 10px; }
    .message-row.me { justify-content: flex-end; }

    .bubble {
      max-width: 75%;
      padding: 8px 12px;
      border-radius: 14px;
      font-size: 0.9rem;
      line-height: 1.4;
      white-space: pre-wrap;
    }

    .bubble.me { background: #ff9ecb; color: #fff; }
    .bubble.other { background: #f3f3f3; color: #444; }

    .input-area {
      display: flex;
      gap: 8px;
      padding: 10px 12px 14px;
      background: #fff5fb;
      border-top: 1px solid rgba(0,0,0,0.05);
    }

    .input-area input {
      flex: 1;
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid #e3c7d7;
      font-size: 0.9rem;
    }

    .input-area button {
      border: none;
      border-radius: 999px;
      padding: 0 18px;
      background: #ff7ab8;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .input-area button:disabled {
      opacity: 0.5;
      cursor: default;
    }
  </style>
</head>

<body>

  <header>
    <button class="back" onclick="goHome()">←</button>
    <div>
      <h1>INEK Chat</h1>
      <div class="sub" style="font-size:0.8rem;">つながる、関わる、続ける。</div>
    </div>
    <div id="userStatus" style="margin-left:auto; font-size:0.8rem;"></div>
  </header>

  <main class="layout">

    <!-- 左：フレンド関連 -->
    <aside class="sidebar">

      <!-- フレンド申請（まだフレンドじゃない人） -->
      <div>
        <h2>フレンド申請</h2>
        <div class="label">まだフレンドじゃない人を検索して申請</div>
        <input id="requestSearch" class="search" placeholder="@ID を入力…">
        <div id="requestResults" class="friend-list"></div>
      </div>

      <!-- フレンド検索（すでにフレンド） -->
      <div style="margin-top:12px;">
        <h2>フレンド検索</h2>
        <div class="label">今フレンドの中から探す</div>
        <input id="friendSearch" class="search" placeholder="フレンドを検索…">
        <div id="friendList" class="friend-list"></div>
      </div>

    </aside>

    <!-- 右：チャット画面 -->
    <section class="chat-area">
      <div id="chatWith" class="chat-header">相手を選択してください</div>
      <div id="messages" class="messages"></div>

      <div class="input-area">
        <input id="messageInput" placeholder="メッセージを入力…" disabled>
        <button id="sendButton" onclick="sendMessage()" disabled>送信</button>
      </div>
    </section>

  </main>

<!-- フレンド申請・フレンド検索・チャット処理 -->
<script type="module">
const {
  auth, db, getUserIdFromEmail, ref, update, get, push, onChildAdded, set
} = window.firebase;

onAuthStateChanged(auth, user => {
  if (!user) {
    window.location.href = "index.html";
    return;
  }

  const me = getUserIdFromEmail(user.email);

  // ============================
  // ここから下にチャット処理全部入れる
  // ============================

  document.getElementById("requestSearch").addEventListener("input", async (e) => {
    const raw = e.target.value.trim();
    const keyword = raw.replace("@", "");
    const box = document.getElementById("requestResults");
    box.innerHTML = "";

    if (!keyword) return;

    const [usersSnap, friendsSnap] = await Promise.all([
      get(ref(db, "users")),
      get(ref(db, `users/${me}/friends`))
    ]);

    const myFriends = friendsSnap.exists() ? friendsSnap.val() : {};
    const results = [];

    usersSnap.forEach(child => {
      const uid = child.key;
      if (uid === me) return;
      if (myFriends[uid]) return;
      if (uid.includes(keyword)) results.push(uid);
    });

    if (results.length === 0) {
      const div = document.createElement("div");
      div.style.fontSize = "0.8rem";
      div.style.color = "#777";
      div.textContent = "該当するユーザーがいません。";
      box.appendChild(div);
      return;
    }

    results.forEach(uid => {
      const div = document.createElement("div");
      div.className = "friend";
      div.textContent = uid + " にフレンド申請";
      div.onclick = () => addFriend(uid);
      box.appendChild(div);
    });
  });

  async function addFriend(friendId) {
    await update(ref(db, `users/${me}/friends`), { [friendId]: true });
    await update(ref(db, `users/${friendId}/friends`), { [me]: true });

    alert(`${friendId} とフレンドになりました！`);
    document.getElementById("requestResults").innerHTML = "";
    document.getElementById("requestSearch").value = "";
    loadFriendList();
  }

  async function loadFriendList(filter = "") {
    const snap = await get(ref(db, `users/${me}/friends`));
    const box = document.getElementById("friendList");
    box.innerHTML = "";

    if (!snap.exists()) {
      const div = document.createElement("div");
      div.style.fontSize = "0.8rem";
      div.style.color = "#777";
      div.textContent = "フレンドがいません。";
      box.appendChild(div);
      return;
    }

    const friends = snap.val();
    Object.keys(friends)
      .filter(uid => uid.includes(filter))
      .forEach(uid => {
        const div = document.createElement("div");
        div.className = "friend";
        div.textContent = uid;
        div.onclick = () => openChatWith(uid);
        box.appendChild(div);
      });
  }

  document.getElementById("friendSearch").addEventListener("input", (e) => {
    loadFriendList(e.target.value.trim());
  });

  function openChatWith(friendId) {
    const roomId = [me, friendId].sort().join("_");

    document.getElementById("chatWith").textContent = `${friendId} とのチャット`;
    document.getElementById("messages").innerHTML = "";

    document.getElementById("messageInput").disabled = false;
    document.getElementById("sendButton").disabled = false;

    loadMessages(roomId);
  }

  function loadMessages(roomId) {
    const messagesRef = ref(db, `rooms/${roomId}/messages`);
    onChildAdded(messagesRef, (snap) => {
      const msg = snap.val();
      appendMessage(msg.text, msg.sender === me ? "me" : "other");
    });
  }

  function appendMessage(text, who) {
    const box = document.getElementById("messages");

    const row = document.createElement("div");
    row.className = `message-row ${who}`;

    const bubble = document.createElement("div");
    bubble.className = `bubble ${who}`;
    bubble.textContent = text;

    row.appendChild(bubble);
    box.appendChild(row);

    box.scrollTop = box.scrollHeight;
  }

  document.getElementById("sendButton").addEventListener("click", async () => {
    const input = document.getElementById("messageInput");
    const text = input.value.trim();
    if (!text) return;

    const friendId = document.getElementById("chatWith").textContent.replace(" とのチャット", "");
    const roomId = [me, friendId].sort().join("_");

    const msgRef = push(ref(db, `rooms/${roomId}/messages`));
    await set(msgRef, {
      sender: me,
      text,
      timestamp: Date.now()
    });

    input.value = "";
  });

  loadFriendList();
});
</script>

</body>
</html>
