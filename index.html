<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>INEK - I Net Engage Keep</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding-top: 80px;
      background: #fff5fb;
      color: #444;
    }

    h1 {
      font-size: 2.5rem;
      color: #ff7ab8;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.1rem;
      margin-bottom: 40px;
    }

    .btn {
      display: block;
      width: 70%;
      max-width: 300px;
      margin: 15px auto;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 1.1rem;
      cursor: pointer;
    }

    .login {
      background: #ff9ecb;
      color: white;
    }

    .signup {
      background: white;
      border: 2px solid #ff9ecb;
      color: #ff7ab8;
    }
  </style>
</head>
<body>

  <h1>INEK</h1>
  <p>つながる、関わる、続ける。</p>

  <button class="btn login" onclick="window.open('login.html', '_blank')">ログイン</button>
  <button class="btn signup" onclick="window.open('signup.html', '_blank')">新規登録</button>

  <div id="status"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
    import { firebaseConfig } from "./firebaseConfig.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, user => {
      if (user) {
        document.getElementById("status").textContent = `${user.email} でログイン中`;
      }
    });
  </script>

</body>
</html>
