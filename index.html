<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>INEK - I Net Engage Keep</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding-top: 80px;
      background: #fff5fb;
      color: #444;
    }

    h1 {
      font-size: 4.0rem;
      color: #ff7ab8;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.1rem;
      margin-bottom: 40px;
    }

    .btn {
      display: block;
      width: 70%;
      max-width: 300px;
      margin: 15px auto;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 1.1rem;
      cursor: pointer;
    }

    .login {
      background: #ff9ecb;
      color: white;
    }

    .logout {
      background: white;
      border: 2px solid #ff9ecb;
      color: #ff7ab8;
      display: none;
    }

    .chat {
      background: linear-gradient(135deg, #ffb3d9, #ff7ab8);
      color: white;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(255, 122, 184, 0.3);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .chat:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 14px rgba(255, 122, 184, 0.4);
    }

    .chat:active {
    transform: translateY(0);
      box-shadow: 0 3px 8px rgba(255, 122, 184, 0.3);
    }

    #status {
      margin-top: 30px;
      font-size: 0.95rem;
      color: #666;
    }
  </style>
</head>
<body>

  <h1>INEK</h1>
  <p>つながる、関わる、続ける。</p>

  <!-- ログインボタン -->
  <button class="btn login" onclick="googleLogin()">Googleでログイン</button>
  <!-- チャットページへ移動 -->
  <button class="btn chat" onclick="goChat()" style="display:none;">チャットページへ</button>

  <!-- ログアウトボタン（最初は非表示） -->
  <button class="btn logout" onclick="logout()">ログアウト</button>

  <div id="status"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider, signOut } 
      from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
    import { firebaseConfig } from "./firebaseConfig.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // Googleログイン
    window.googleLogin = function () {
      signInWithPopup(auth, provider)
        .catch(err => {
          console.error(err);
          alert("ログインに失敗しました: " + err.message);
        });
    };

    // チャットページへ移動
    window.goChat = function () {
      window.location.href = "chat.html";
    };

    // ログアウト
    window.logout = function () {
      signOut(auth)
        .catch(err => {
          console.error(err);
          alert("ログアウトに失敗しました: " + err.message);
        });
    };

    // ログイン状態の監視
    onAuthStateChanged(auth, user => {
      const statusEl = document.getElementById("status");
      const loginBtn = document.querySelector(".login");
      const chatBtn = document.querySelector(".chat");
      const logoutBtn = document.querySelector(".logout");

      if (user) {
        statusEl.textContent = `${user.displayName} でログイン中`;
        loginBtn.style.display = "none";
        logoutBtn.style.display = "block";
        chatBtn.style.display = "block";
      } else {
        statusEl.textContent = "";
        loginBtn.style.display = "block";
        logoutBtn.style.display = "none";
        chatBtn.style.display = "none";
      }
    });
  </script>

</body>
</html>
