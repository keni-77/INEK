<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>INEK - ログイン</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding-top: 60px;
      background: #fff5fb;
      color: #444;
    }

    h2 {
      color: #ff7ab8;
      margin-bottom: 20px;
    }

    input {
      width: 80%;
      max-width: 300px;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: 2px solid #ff9ecb;
      font-size: 1rem;
    }

    button {
      width: 80%;
      max-width: 300px;
      padding: 12px;
      margin-top: 20px;
      border: none;
      border-radius: 10px;
      background: #ff9ecb;
      color: white;
      font-size: 1.1rem;
      cursor: pointer;
    }

    .link {
      margin-top: 20px;
      font-size: 0.9rem;
    }

    .link a {
      color: #ff7ab8;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <h2>ログイン</h2>

  <input id="email" type="email" placeholder="メールアドレス">
  <input id="password" type="password" placeholder="パスワード">

  <button onclick="login()">ログイン</button>

  <div class="link">
    <!-- 同じタブで遷移 -->
    <a href="signup.html">新規登録はこちら</a>
  </div>

  <script type="module" src="login.js"></script>
</body>
</html>
